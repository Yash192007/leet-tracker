{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="card-title mb-0">Add Student</h2>
          <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('index') }}">Back</a>
        </div>
        <p class="text-muted">Register a student and automatically pull their latest LeetCode stats.</p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">LeetCode Username</label>
            <input class="form-control" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Student Password</label>
            <input type="password" class="form-control" name="password" placeholder="Optional default password">
          </div>
          <button class="btn btn-primary w-100">Add</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
