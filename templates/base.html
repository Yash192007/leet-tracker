<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeetCode Class Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: linear-gradient(135deg, #f8fbff, #eef4ff); color: #17324d; }
      .card { border: none; border-radius: 1rem; }
      .hero { background: linear-gradient(90deg, #1d4ed8, #2563eb); color: white; }
      .stat-box { border-radius: 1rem; background: #fff; box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">LeetCode Class Tracker</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('add_student') }}">Add Student</a>
          <a class="nav-link" href="{{ url_for('refresh_all') }}">Refresh Data</a>
          <a class="nav-link" href="{{ url_for('export_excel') }}">Export Excel</a>
          {% if admin_logged_in %}
          <a class="nav-link" href="{{ url_for('admin_dashboard') }}">Admin Dashboard</a>
          <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
          {% else %}
          <a class="nav-link" href="{{ url_for('admin_login') }}">Admin Login</a>
          {% endif %}
        </div>
      </div>
    </nav>
    <div class="container py-4">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
